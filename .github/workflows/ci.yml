name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  node-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript typecheck
        shell: bash {0}
        run: |
          npx tsc --noEmit > /tmp/tsc.log 2>&1
          REAL=$(grep 'error TS' /tmp/tsc.log | grep -cv 'pcscService')
          echo "TypeScript errors (excluding pcscService): $REAL"
          if [ "$REAL" -gt 0 ]; then
            grep 'error TS' /tmp/tsc.log | grep -v 'pcscService'
            exit 1
          fi
      - name: Vitest
        run: npm test
      - name: Vite build
        run: npm run build

  python-tests:
    runs-on: ubuntu-latest
    env:
      MOCK_MODE: 'true'
      IRBIS_MOCK: 'true'
      DATABASE_PATH: /tmp/ci_shelf_data.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Syntax check
        run: find bookcabinet tools -name "*.py" -exec python -m py_compile {} +
      - name: Install deps
        run: pip install aiohttp alembic pyserial pytest
      - name: Pytest (mock mode)
        run: python -m pytest bookcabinet/tests/ -v
